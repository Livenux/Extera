name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: extera-next-windows
          path: build/windows/x64/runner/Release/

      - name: Build unsigned MSIX (optional)
        if: github.event_name != 'release'
        run: flutter pub run msix:create --sign-msix false --install-certificate false
        continue-on-error: true

      - name: Upload unsigned MSIX artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: extera-next-windows-msix-unsigned
          path: build/windows/x64/runner/Release/*.msix
        continue-on-error: true

      - name: Build signed MSIX (release only)
        if: github.event_name == 'release' && env.WINDOWS_PFX != ''
        env:
          WINDOWS_PFX: ${{ secrets.WINDOWS_PFX }}
          WINDOWS_PFX_PASS: ${{ secrets.WINDOWS_PFX_PASS }}
        run: |
          $env:WINDOWS_PFX | Out-File -FilePath fluffychat.pem -Encoding utf8
          certutil -decode fluffychat.pem fluffychat.pfx
          flutter pub run msix:create -c fluffychat.pfx -p "$env:WINDOWS_PFX_PASS" --sign-msix true --install-certificate false

      - name: Upload signed MSIX to release
        if: github.event_name == 'release' && env.WINDOWS_PFX != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/Release/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_PFX: ${{ secrets.WINDOWS_PFX }}
